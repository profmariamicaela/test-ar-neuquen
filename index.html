<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebXR Nativo</title>
    <!-- Motor gráfico Core estable en su versión de compatibilidad WebXR extendida -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- HUD que guía al usuario por las coordenadas de Neuquén -->
    <div id="interfaz-turista">Sincronizando satélites GPS...</div>

    <!-- CORRECCIÓN MAESTRA: Forzamos la inicialización de la API nativa de Realidad Aumentada y el botón XR inferior -->
    <a-scene 
        webxr="optionalFeatures: hit-test, local-floor; requiredFeatures: local-floor;" 
        renderer="colorManagement: true;" 
        xr-mode-ui="enabled: true;">
        
        <!-- El escenario se posiciona a la altura estimada del piso real (-1.6 metros del nivel del ojo) -->
        <a-entity id="escenario-fijo" position="0 -1.6 -3.5">
            <a-entity id="modelo-renderizado" rotation="0 45 0"></a-entity>
        </a-entity>

        <!-- Iluminación para exteriores en las bardas -->
        <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- Cámara vinculada a los controles inerciales del hardware del celular -->
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const escenarioFijo = document.getElementById('escenario-fijo');
        const renderObjeto = document.getElementById('modelo-renderizado');
        
        let idEstacionActual = null; 

        // MATRIZ DE COORDENADAS CON TUS PUNTOS DE TESTEO PARQUE AVELLANEDA
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: 'models/dino.glb', escala: '0.8 0.8 0.8' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: 'models/mono.glb', escala: '1.0 1.0 1.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, src: 'models/planta.glb', escala: '0.9 0.9 0.9' }
        ];


        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null; let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) { menorDistancia = dist; }
                    if (dist <= estacion.rango) { estacionActiva = estacion; }
                });

                if (estacionActiva) {
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        console.log(`Inyectando activo en entorno WebXR nativo: ${estacionActiva.id}`);
                        
                        // Recarga limpia del nodo para la GPU
                        renderObjeto.removeAttribute('gltf-model');
                        setTimeout(() => {
                            renderObjeto.setAttribute('gltf-model', estacionActiva.src);
                            renderObjeto.setAttribute('scale', estacionActiva.escala);
                        }, 50);
                    }
                    // Le avisamos al turista que la estación está lista y debe iniciar la RA física
                    hud.innerHTML = `<span style="color: #10b981;">● Ubicación Detectada</span><br>${estacionActiva.nombre}<br><small style="color: #67e8f9;">Toca el botón "AR" abajo a la derecha</small>`;
                } else {
                    if (idEstacionActual !== null) {
                        renderObjeto.removeAttribute('gltf-model');
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próximo punto de interés a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación precisa en tu dispositivo.";
            }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }
    </script>
</body>
</html>
