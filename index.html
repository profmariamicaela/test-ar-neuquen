<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - Anclaje Giroscópico Puro</title>
    
    <!-- Core de A-Frame Estable (Sin AR.js que rompa el tracking local) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: #000; }
        
        /* Forzamos la cámara web nativa de fondo */
        #camara-fondo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* La escena 3D se renderiza encima de la cámara de forma transparente */
        a-scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
        }
        
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Video nativo: Esto garantiza que la cámara trasera abra SI O SI en cualquier celular -->
    <video id="camara-fondo" autoplay playsinline muted></video>

    <!-- HUD de guiado permanente -->
    <div id="interfaz-turista">Buscando satélites GPS...</div>

    <!-- Escena transparente independiente. No usamos WebXR ni AR.js para evitar conflictos de cámara -->
    <a-scene embedded vr-mode-ui="enabled: false" style="background: transparent;">
        
        <a-assets>
            <a-asset-item id="dino-glb" src="models/dino.glb"></a-asset-item>
            <a-asset-item id="mono-glb" src="models/mono.glb"></a-asset-item>
            <a-asset-item id="planta-glb" src="models/planta.glb"></a-asset-item>
        </a-assets>

        <!-- Contenedor Maestro: Altura fija a -1.6 (nivel del suelo simulado) y 3 metros al frente -->
        <a-entity id="contenedor-estacion" position="0 -1.6 -3" visible="false">
            <a-entity id="modelo-dinamico" rotation="0 45 0"></a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- look-controls nativo: toma los sensores del giroscopio del celular para congelar el mundo 3D -->
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const video = document.getElementById('camara-fondo');
        const contenedorEstacion = document.getElementById('contenedor-estacion');
        const modeloDinamico = document.getElementById('modelo-dinamico');
        
        let idEstacionActual = null; 

        // Configuración del circuito turístico de Neuquén 
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: '#dino-glb', escala: '0.2 0.2 0.2' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.64495467831919, lon: -58.47277079022688, rango: 20, src: '#mono-glb', escala: '0.3 0.3 0.3' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona',lat: -34.644489104415065, lon: -58.47366534972228, rango: 15, src: '#planta-glb', escala: '0.2 0.2 0.2' }
        </tbody>;

        // Forzar apertura de la cámara trasera de manera nativa por HTML5
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { hud.innerHTML = "Error crítico: Permití el acceso a la cámara."; });

        // Fórmula Haversine para calcular distancias en metros
        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // Sistema de escucha de Geolocalización
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null; 
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) { menorDistancia = dist; }
                    if (dist <= estacion.rango) { estacionActiva = estacion; }
                });

                if (estacionActiva) {
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        
                        // Inyectamos el modelo 3D
                        modeloDinamico.setAttribute('gltf-model', estacionActiva.src);
                        modeloDinamico.setAttribute('scale', estacionActiva.escala);
                        
                        // Activamos la visibilidad. Al usar look-controls sin interferencia de AR.js, 
                        // el objeto hereda la orientación del giroscopio del teléfono al renderizarse.
                        contenedorEstacion.setAttribute('visible', 'true');
                    }
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    if (idEstacionActual !== null) {
                        contenedorEstacion.setAttribute('visible', 'false');
                        modeloDinamico.removeAttribute('gltf-model');
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próxima estación a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación de alta precisión.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            hud.innerHTML = "Tu dispositivo no soporta geolocalización.";
        }
    </script>
</body>
</html>
