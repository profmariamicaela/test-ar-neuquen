<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebAR</title>
    <!-- Motores gráficos estables para WebAR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- HUD de la barda de Neuquén -->
    <div id="interfaz-turista">Sincronizando satélites GPS...</div>

    <!-- CORRECCIÓN CRÍTICA: Inicializamos AR.js configurando el motor de posicionamiento inercial -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
        vr-mode-ui="enabled: false">
        
        <!-- Contenedor Maestro: Al usar 'gps-entity-place', AR.js amarra matemáticamente este bloque 
             a un punto del planeta en coordenadas reales, independizándolo del lente de tu cámara -->
        <a-entity id="estacion-anclada" gps-entity-place="latitude: 0; longitude: 0;">
            <!-- Acá inyectaremos el modelo que simulará estar físicamente clavado en el piso -->
            <!-- Ajustamos la posición relativa interna a Y = -1 para apoyarlo en la visual del suelo -->
            <a-entity id="contenedor-render" position="0 -1.0 0"></a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- Cámara con lector de rotación y sistema inercial de GPS coordinados -->
        <a-entity camera look-controls rotation-reader></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const anclajeGps = document.getElementById('estacion-anclada');
        const contenedorRender = document.getElementById('contenedor-render');
        
        let idEstacionActual = null; 

        // MATRIZ DE COORDENADAS CON TUS PUNTOS DE TESTEO PARQUE AVELLANEDA
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: 'models/dino.glb', escala: '0.8 0.8 0.8' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: 'models/mono.glb', escala: '1.0 1.0 1.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64303003650104, lon: -58.471023920994114, rango: 15, src: 'models/planta.glb', escala: '0.9 0.9 0.9' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null;
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) {
                        menorDistancia = dist;
                    }
                    if (dist <= estacion.rango) {
                        estacionActiva = estacion;
                    }
                });

                if (estacionActiva) {
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        console.log(`Fijando anclaje geográfico para: ${estacionActiva.id}`);
                        
                        // 1. Desplazamos dinámicamente el anclaje virtual del mundo a la coordenada exacta del elemento
                        anclajeGps.setAttribute('gps-entity-place', `latitude: ${estacionActiva.lat}; longitude: ${estacionActiva.lon};`);
                        
                        // 2. Limpiamos la GPU e inyectamos el nodo del modelo tridimensional
                        contenedorRender.innerHTML = "";
                        
                        const nuevoModelo = document.createElement('a-entity');
                        nuevoModelo.setAttribute('gltf-model', estacionActiva.src);
                        nuevoModelo.setAttribute('scale', estacionActiva.escala);
                        nuevoModelo.setAttribute('rotation', '0 45 0');
                        
                        contenedorRender.appendChild(nuevoModelo);
                    }
                    
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    if (idEstacionActual !== null) {
                        console.log("Removiendo de la escena (Fuera de rango)");
                        contenedorRender.innerHTML = "";
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próximo punto de interés a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación precisa en tu dispositivo.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            hud.innerHTML = "Dispositivo incompatible con sistemas de posicionamiento global.";
        }
    </script>
</body>
</html>
