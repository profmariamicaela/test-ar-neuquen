<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebAR Desacoplado</title>
    <!-- Usamos la librería exacta del Código 1 que me daba estabilidad -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: #000; }
        
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body>

    <!-- HUD del circuito turístico siempre visible arriba -->
    <div id="interfaz-turista">Buscando satélites GPS...</div>

    <!-- ESCENA DEL CÓDIGO 1: Con la API nativa de WebXR para clavar el objeto al piso virtual -->
    <a-scene webxr="optionalFeatures: hit-test, local-floor;" arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <!-- Pre-cargamos los modelos para que no tarden en el circuito -->
            <a-asset-item id="dinosaurio" src="models/dino.glb"></a-asset-item>
            <a-asset-item id="mono" src="models/mono.glb"></a-asset-item>
            <a-asset-item id="planta" src="models/planta.glb"></a-asset-item>
        </a-assets>

        <!-- TU BLOQUE DE ANCLAJE DEL CÓDIGO 1 (Contenedor Inicializado Vacío y Oculto) -->
        <a-entity id="contenedor-estacion" position="0 0 -3" visible="false">
            <a-entity id="modelo-dinamico" scale="0.2 0.2 0.2" rotation="0 45 0">
            </a-entity>
        </a-entity>

        <!-- Iluminación para que los escenarios luzcan realistas con el sol de Neuquén -->
        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- CÁMARA DEL CÓDIGO 1: Desvinculada para que camines alrededor sin que se mueva el modelo -->
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const contenedorEstacion = document.getElementById('contenedor-estacion');
        const modeloDinamico = document.getElementById('modelo-dinamico');
        
        let idEstacionActual = null; 

        // Tus puntos de interés del circuito de Neuquén
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: '#dinosaurio', escala: '0.2 0.2 0.2' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: '#mono', escala: '0.3 0.3 0.3' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, src: '#planta', escala: '0.2 0.2 0.2' }
        ];

        // Fórmula Haversine matemática para medir distancia real en metros
        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // Sistema de Geolocalización en Tiempo Real
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null; 
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) { menorDistancia = dist; }
                    if (dist <= estacion.rango) { estacionActiva = estacion; }
                });

                // TU LÓGICA DE UNIFICACIÓN:
                if (estacionActiva) {
                    // Si acabamos de entrar al rango de una nueva estación
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        
                        // 1. Inyectamos el modelo correspondiente usando la ID del asset pre-cargado
                        modeloDinamico.setAttribute('gltf-model', estacionActiva.src);
                        modeloDinamico.setAttribute('scale', estacionActiva.escala);
                        
                        // 2. IMPORTANTÍSIMO: Hacemos visible el contenedor en la posición fija local (0 0 -3)
                        // Esto hace que el navegador lo dibuje a 3 metros adelante tuyo EXACTAMENTE en el lugar donde estás parado ahora.
                        contenedorEstacion.setAttribute('visible', 'true');
                        
                        console.log(`[PM LOG] Trigger activado: Modelo ${estacionActiva.id} emplazado estáticamente a 3 metros del usuario.`);
                    }
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    // Si el usuario sale del rango de la estación, limpiamos y ocultamos para que no flote en el aire
                    if (idEstacionActual !== null) {
                        contenedorEstacion.setAttribute('visible', 'false');
                        modeloDinamico.removeAttribute('gltf-model');
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próxima estación a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación de alta precisión en tu celular.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            hud.innerHTML = "Tu dispositivo no soporta geolocalización nativa.";
        }
    </script>
</body>
</html>
