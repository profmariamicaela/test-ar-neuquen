<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebAR</title>
    <!-- Motor gráfico estable sin requerimientos WebXR bloqueantes -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- HUD de guiado en el sendero -->
    <div id="interfaz-turista">Sincronizando satélites GPS...</div>

    <!-- La escena se mantiene activa siempre para no congelar la GPU -->
    <a-scene id="escena-ar" vr-mode-ui="enabled: false" renderer="colorManagement: true;">
        
        <!-- El contenedor se mantiene clavado a la altura estimada del piso real -->
        <a-entity id="anclaje-piso" position="0 -1.6 -3">
            <!-- La entidad nace limpia, sin modelo asignado -->
            <a-entity id="modelo-dinamico" rotation="0 45 0"></a-entity>
        </a-entity>

        <!-- Iluminación forzada de laboratorio para evitar modelos negros -->
        <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const renderObjeto = document.getElementById('modelo-dinamico');

        // MATRIZ DE COORDENADAS CON TUS PUNTOS DE TESTEO
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios',  lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: 'models/dino.glb', escala: '0.8 0.8 0.8' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: 'models/mono.glb', escala: '1.0 1.0 1.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64303003650104, lon: -58.471023920994114, rango: 15, src: 'models/planta.glb', escala: '0.9 0.9 0.9' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null;
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) {
                        menorDistancia = dist;
                    }
                    if (dist <= estacion.rango) {
                        estacionActiva = estacion;
                    }
                });

                if (estacionActiva) {
                    // VERIFICACIÓN E INYECCIÓN EN CALIENTE
                    // Leemos qué modelo tiene asignado actualmente la entidad
                    const modeloActual = renderObjeto.getAttribute('gltf-model');
                    
                    // Si la entidad está vacía o tiene el modelo de otra estación, lo cambiamos
                    if (!modeloActual || modeloActual !== estacionActiva.src) {
                        console.log(`Inyectando activo 3D: ${estacionActiva.src}`);
                        renderObjeto.setAttribute('gltf-model', estacionActiva.src);
                        renderObjeto.setAttribute('scale', estacionActiva.escala);
                    }
                    
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    // FUERA DE RANGO: Vaciamos el atributo para liberar memoria RAM y ocultar el objeto
                    if (renderObjeto.hasAttribute('gltf-model')) {
                        console.log("Removiendo activo 3D (Fuera de rango)");
                        renderObjeto.removeAttribute('gltf-model');
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próximo punto de interés a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación precisa en los ajustes de tu navegador.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            hud.innerHTML = "Tu dispositivo no cuenta con soporte de geolocalización.";
        }
    </script>
</body>
</html>
