<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Circuito Turístico Neuquén - WebAR</title>
    <!-- A-Frame estable para tracking de piso WebXR nativo -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #cartel-estacion {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.8);
            color: #00ffcc;
            padding: 12px 25px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="cartel-estacion">Cargando Estación Turística...</div>

    <!-- Escena limpia de WebXR nativo (Cero dependencias de GPS roto) -->
    <a-scene webxr="optionalFeatures: hit-test, local-floor;" renderer="colorManagement: true;">
        
        <a-assets id="assets-pool">
            <!-- Declaramos los tres recursos del circuito de Neuquén -->
            <a-asset-item id="dino-glb" src="models/dino.glb"></a-asset-item>
            <a-asset-item id="mono-glb" src="models/mono.glb"></a-asset-item>
            <a-asset-item id="planta-glb" src="models/planta.glb"></a-asset-item>
        </a-assets>

        <!-- Contenedor único que recibirá el modelo dinámicamente -->
        <!-- Modificamos la posición del contenedor: -->
        <!-- Y = -1.6 (lo baja más hacia el piso real) | Z = -3 (lo aleja un metro más para verlo mejor de cuerpo entero) -->
        <a-entity id="anclaje-espacial" position="0 -1.6 -3">
            <a-entity id="modelo-activo" gltf-model="" scale="1 1 1" rotation="0 45 0"></a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; intensity: 0.6;" position="1 3 1"></a-entity>
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const cartel = document.getElementById('cartel-estacion');
        const elModelo = document.getElementById('modelo-activo');

        const urlParams = new URLSearchParams(window.location.search);
        const estacionId = urlParams.get('id');

        // ESCALAS MEDIAS AJUSTADAS (Ni gigantes ni milimétricas)
        const estaciones = {
            'dino': { 
                nombre: 'Estación 1: Parque de los Dinosaurios', 
                asset: '#dino-glb', 
                escala: '0.8 0.8 0.8' 
            },
            'mono': { 
                nombre: 'Estación 2: Fauna Autóctona', 
                asset: '#mono-glb', 
                escala: '1.0 1.0 1.0' // Reducido a la mitad del test anterior
            },
            'planta': { 
                nombre: 'Estación 3: Flora de la Barda', 
                asset: '#planta-glb', 
                escala: '0.9 0.9 0.9' 
            }
        };

        if (estacionId && estaciones[estacionId]) {
            const datos = estaciones[estacionId];
            cartel.innerText = datos.nombre;
            elModelo.setAttribute('gltf-model', datos.asset);
            elModelo.setAttribute('scale', datos.escala);
        } else {
            cartel.innerText = "Estación 1: Parque de los Dinosaurios (Modo Demostración)";
            elModelo.setAttribute('gltf-model', '#dino-glb');
            elModelo.setAttribute('scale', '0.8 0.8 0.8');
        }
    });
</script>
</body>
</html>
