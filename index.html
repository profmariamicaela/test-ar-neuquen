<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuquén WebAR - Unificado Nativo</title>
    <!-- A-Frame para WebXR nativo (Exactamente el del Código 1) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* Agregamos el HUD flotante encima de la pantalla de WebXR */
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- HUD superior de guiado turístico -->
    <div id="interfaz-turista">Buscando satélites GPS...</div>

    <!-- CONFIGURACIÓN EXACTA DE TU CÓDIGO 1 -->
    <a-scene webxr="optionalFeatures: hit-test, local-floor;" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- Pre-cargamos todos tus modelos de Neuquén -->
            <a-asset-item id="dinosaurio" src="dino.glb"></a-asset-item>
            <a-asset-item id="mono" src="mono.glb"></a-asset-item>
            <a-asset-item id="planta" src="planta.glb"></a-asset-item>
        </a-assets>

        <!-- TU BLOQUE DE ANCLAJE QUE FUNCIONA PERFECTO -->
        <!-- Lo inicializamos vacío y visible="false". Solo aparecerá si estás en zona -->
        <a-entity id="contenedor-dino" position="0 0 -2" visible="false">
            <a-entity  
                id="modelo-dinamico"
                scale="0.2 0.2 0.2"
                rotation="0 45 0">
            </a-entity>
        </a-entity>

        <!-- CÁMARA EXACTA DEL CÓDIGO 1 (Se desvincula del objeto para caminar alrededor) -->
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const contenedorDino = document.getElementById('contenedor-dino');
        const modeloDinamico = document.getElementById('modelo-dinamico');
        
        let idEstacionActual = null; 

        // Tus puntos turísticos cargados
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: '#dinosaurio' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: '#mono' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, src: '#planta' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null; 
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) { menorDistancia = dist; }
                    if (dist <= estacion.rango) { estacionActiva = estacion; }
                });

                if (estacionActiva) {
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        
                        // Inyectamos el modelo de forma dinámica en tu estructura nativa
                        modeloDinamico.setAttribute('gltf-model', estacionActiva.src);
                        
                        // Activamos la visibilidad de tu contenedor clavado a Z = -2
                        contenedorDino.setAttribute('visible', 'true');
                    }
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    if (idEstacionActual !== null) {
                        contenedorDino.setAttribute('visible', 'false');
                        modeloDinamico.removeAttribute('gltf-model');
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próxima estación a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Señal de GPS baja. Asegurate de estar en exteriores.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            hud.innerHTML = "Tu dispositivo no soporta geolocalización.";
        }
    </script>
</body>
</html>
