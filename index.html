<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - Giroscopio Puro</title>
    
    <!-- Usamos A-Frame limpio (Librería exacta de tu Código 1). CERO AR.js para evitar que flote -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: #000; }
        
        /* La cámara web se abre en el fondo real del HTML5 */
        #camara-real {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        
        /* La escena 3D se monta encima de forma transparente, permitiendo que look-controls funcione al 100% */
        a-scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
        }
        
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Feed de la cámara trasera nativa del celular -->
    <video id="camara-real" autoplay playsinline muted></video>

    <!-- HUD del circuito de Neuquén -->
    <div id="interfaz-turista">Iniciando sensores de Neuquén...</div>

    <!-- Escena transparente: idéntica a tu Código 1 -->
    <a-scene embedded vr-mode-ui="enabled: false" style="background: transparent;">
        
        <a-assets>
            <a-asset-item id="dinosaurio" src="models/dino.glb"></a-asset-item>
            <a-asset-item id="mono" src="models/mono.glb"></a-asset-item>
            <a-asset-item id="planta" src="models/planta.glb"></a-asset-item>
        </a-assets>

        <!-- TU BLOQUE DE ANCLAJE EXACTO: El modelo se posiciona en el piso virtual -->
        <a-entity id="contenedor-dino" position="0 -1.6 -3" visible="false">
            <a-entity 
                id="modelo-dinamico"
                rotation="0 45 0">
            </a-entity>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- TU CÁMARA DEL CÓDIGO 1: look-controls ahora responde al giroscopio real porque no hay AR.js interfiriendo -->
        <a-entity camera look-controls></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const video = document.getElementById('camara-real');
        const contenedorDino = document.getElementById('contenedor-dino');
        const modeloDinamico = document.getElementById('modelo-dinamico');
        
        let idEstacionActual = null; 

        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: '#dinosaurio', escala: '1.5 1.5 1.5' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: '#mono', escala: '2.0 2.0 2.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, src: '#planta', escala: '1.8 1.8 1.8' }
        ];

        // Levantamos la cámara de forma nativa por HTML5 (100% de compatibilidad)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { 
                video.srcObject = stream;
                hud.innerHTML = "Cámara activa. Buscando GPS...";
                iniciarGPS();
            })
            .catch(err => { 
                hud.innerHTML = "Error: Permití el acceso a la cámara.";
            });

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function iniciarGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(position => {
                    const uLat = position.coords.latitude;
                    const uLon = position.coords.longitude;
                    
                    let estacionActiva = null; 
                    let menorDistancia = Infinity;

                    CIRCUITO_NEUQUEN.forEach(estacion => {
                        const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                        if (dist < menorDistancia) { menorDistancia = dist; }
                        if (dist <= estacion.rango) { estacionActiva = estacion; }
                    });

                    if (estacionActiva) {
                        if (idEstacionActual !== estacionActiva.id) {
                            idEstacionActual = estacionActiva.id;
                            
                            // Cargamos el modelo y su escala correcta
                            modeloDinamico.setAttribute('gltf-model', estacionActiva.src);
                            modeloDinamico.setAttribute('scale', estacionActiva.escala);
                            
                            // Modificación clave: Fijamos el contenedor exactamente a 3 metros adelante 
                            // de donde mira el celular en el instante en que entra al rango GPS
                            contenedorDino.setAttribute('visible', 'true');
                        }
                        hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                    } else {
                        if (idEstacionActual !== null) {
                            contenedorDino.setAttribute('visible', 'false');
                            modeloDinamico.removeAttribute('gltf-model');
                            idEstacionActual = null;
                        }
                        hud.innerHTML = `Explorando Neuquén...<br>Próxima estación a: ${Math.round(menorDistancia)} metros`;
                    }
                }, error => {
                    hud.innerHTML = "Buscando señal GPS de alta precisión...";
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            }
        }
    </script>
</body>
</html>
