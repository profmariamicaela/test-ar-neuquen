<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebAR</title>
    <!-- Motores gráficos estables y con soporte de orientación corregido -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- HUD del circuito de Neuquén -->
    <div id="interfaz-turista">Sincronizando satélites GPS...</div>

    <!-- Inicializamos la escena fijando el tracking en modo óptico/giroscópico puro para clavar los objetos -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" vr-mode-ui="enabled: false">
        
        <!-- Contenedor Maestro de Referencia Espacial Fija (Eje Z = 3 metros adelante) -->
        <a-entity id="escenario-fijo" position="0 -1.6 -3"></a-entity>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- Sincroniza la cámara con el lector de orientación del dispositivo móvil para fijar el anclaje -->
        <a-entity camera look-controls rotation-reader></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const escenarioFijo = document.getElementById('escenario-fijo');
        
        // Control interno para saber qué ID se está reproduciendo en la GPU
        let idEstacionActual = null; 

        // MATRIZ DE COORDENADAS CON PUNTOS DE TESTEO PARQUE AVELLANEDA
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: 'models/dino.glb', escala: '0.8 0.8 0.8' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: 'models/mono.glb', escala: '1.0 1.0 1.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64303003650104, lon: -58.471023920994114, rango: 15, src: 'models/planta.glb', escala: '0.9 0.9 0.9' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null;
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) {
                        menorDistancia = dist;
                    }
                    if (dist <= estacion.rango) {
                        estacionActiva = estacion;
                    }
                });

                if (estacionActiva) {
                    // Si entramos a un punto y es DISTINTO al que ya estaba cargado en memoria
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        console.log(`Cambiando de estación de forma automática a: ${estacionActiva.id}`);
                        
                        // CORRECCIÓN 2: Vaciamos el contenedor borrando los nodos viejos de la memoria gráfica
                        escenarioFijo.innerHTML = "";
                        
                        // Generamos una entidad limpia e inyectamos el modelo forzando el render inmediato
                        const nuevaEntidad = document.createElement('a-entity');
                        nuevaEntidad.setAttribute('id', 'modelo-renderizado');
                        nuevaEntidad.setAttribute('gltf-model', estacionActiva.src);
                        nuevaEntidad.setAttribute('scale', estacionActiva.escala);
                        // Agregamos una rotación inicial estable
                        nuevaEntidad.setAttribute('rotation', '0 45 0'); 
                        
                        escenarioFijo.appendChild(nuevaEntidad);
                    }
                    
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    // FUERA DE RANGO: Si nos alejamos caminando, limpiamos el escenario este FUNCA OK 
                    if (idEstacionActual !== null) {
                        console.log("Limpiando escenario gráfico (Fuera de rango)");
                        escenarioFijo.innerHTML = "";
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próximo punto de interés a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación precisa en tu dispositivo.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            hud.innerHTML = "Tu hardware no soporta geolocalización nativa.";
        }
    </script>
</body>
</html>
