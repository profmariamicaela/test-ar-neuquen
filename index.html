<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuquén WebAR - Circuito Turístico</title>
    <!-- A-Frame para WebXR nativo (Tu librería del Código 1) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; }
        
        /* Pantalla de guía GPS intermedia */
        #pantalla-guia {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            color: #06b6d4;
            z-index: 99999;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .btn-buscar {
            background: #06b6d4; color: #fff; border: none; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Esta pantalla maneja al turista mientras camina por Neuquén -->
    <div id="pantalla-guia">
        <h2 id="texto-estado">Iniciando GPS de Neuquén...</h2>
        <p id="texto-distancia">Esperando señal de satélite de alta precisión...</p>
    </div>

    <!-- TU ESCENA EXACTA DEL CÓDIGO 1 (Empieza oculta con un div para que no interfiera) -->
    <div id="contenedor-ar" style="display: none; width: 100%; height: 100%;">
        <a-scene webxr="optionalFeatures: hit-test, local-floor;" arjs="sourceType: webcam; debugUIEnabled: false;">
            
            <a-assets id="assets-pool">
                <!-- Los assets se inyectarán acá dinámicamente según la estación -->
            </a-assets>

            <!-- TU BLOQUE DE ANCLAJE EXACTO DEL CÓDIGO 1 -->
            <a-entity id="contenedor-dino" position="0 0 -2">
                <a-entity 
                    id="modelo-turistico"
                    scale="0.2 0.2 0.2"
                    rotation="0 45 0">
                </a-entity>
            </a-entity>

            <!-- TU CÁMARA EXACTA DEL CÓDIGO 1 -->
            <a-entity camera look-controls></a-entity>
            
        </a-scene>
    </div>

    <script>
        const pantallaGuia = document.getElementById('pantalla-guia');
        const contenedorAR = document.getElementById('contenedor-ar');
        const textoEstado = document.getElementById('texto-estado');
        const textoDistancia = document.getElementById('texto-distancia');
        
        const assetsPool = document.getElementById('assets-pool');
        const modeloTuristico = document.getElementById('modelo-turistico');

        let arIniciado = false;

        // El circuito con tus coordenadas y los nombres de tus archivos .glb
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, file: 'dino.glb' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, file: 'mono.glb' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, file: 'planta.glb' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null; 
                let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) { menorDistancia = dist; }
                    if (dist <= estacion.rango) { estacionActiva = estacion; }
                });

                if (estacionActiva) {
                    // SI LLEGÓ A LA UBICACIÓN:
                    if (!arIniciado) {
                        arIniciado = true;
                        
                        // 1. Configuramos el asset y el modelo de forma limpia antes de prender la escena
                        assetsPool.innerHTML = `<a-asset-item id="item-dinamico" src="${estacionActiva.file}"></a-asset-item>`;
                        modeloTuristico.setAttribute('gltf-model', '#item-dinamico');
                        
                        // 2. Apagamos la pantalla GPS y encendemos TU CÓDIGO 1 intacto
                        pantallaGuia.style.display = 'none';
                        contenedorAR.style.display = 'block';
                    }
                } else {
                    // SI ESTÁ LEJOS:
                    arIniciado = false;
                    contenedorAR.style.display = 'none';
                    pantallaGuia.style.display = 'flex';
                    
                    textoEstado.innerHTML = "Explorando circuito turístico de Neuquén";
                    textoDistancia.innerHTML = `Camina hacia la barda. Próxima estación a: <br><strong style="font-size:24px; color:#fff;">${Math.round(menorDistancia)} metros</strong>`;
                }
            }, error => {
                textoEstado.innerHTML = "Error de GPS";
                textoDistancia.innerHTML = "Por favor, activa la ubicación de alta precisión de tu celular para iniciar el recorrido.";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 12000
            });
        } else {
            textoEstado.innerHTML = "Dispositivo no compatible";
            textoDistancia.innerHTML = "Tu navegador no soporta geolocalización nativa.";
        }
    </script>
</body>
</html>
