<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebAR Local Lock</title>
    <!-- Motores gráficos estables -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="interfaz-turista">Sincronizando satélites GPS...</div>

    <script>
        // COMPONENTE PERSONALIZADO: Congela el objeto en el espacio tridimensional absoluto
        AFRAME.registerComponent('anclaje-estatico', {
            init: function () {
                // Al nacer el objeto, detectamos dónde está mirando el usuario
                var camaraEl = document.querySelector('[camera]');
                var cameraPosition = new THREE.Vector3();
                var cameraDirection = new THREE.Vector3();
                
                // Extraemos la posición y dirección exacta de la cámara del celular
                camaraEl.object3D.getWorldPosition(cameraPosition);
                camaraEl.object3D.getWorldDirection(cameraDirection);
                
                // Calculamos un punto fijo en el piso a 3 metros adelante de donde miras
                // Multiplicamos por -3 en el eje Z de la cámara
                var puntoFijoX = cameraPosition.x + (cameraDirection.x * -3);
                var puntoFijoZ = cameraPosition.z + (cameraDirection.z * -3);
                
                // Forzamos al objeto a clavarse en esa coordenada del mundo de forma absoluta
                this.el.object3D.position.set(puntoFijoX, -1.6, puntoFijoZ);
                
                // Bloqueamos su matriz de transformación para que no escuche actualizaciones de la cámara
                this.el.object3D.matrixAutoUpdate = false;
                this.el.object3D.updateMatrix();
                
                console.log("Matriz congelada. Objeto soldado al terreno de Neuquén.");
            }
        });
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <!-- El escenario se mantiene limpio. El script inyectará el modelo con el componente de congelamiento -->
        <a-entity id="escenario-fijo"></a-entity>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
        <a-entity light="type: directional; position: 1 4 2; intensity: 0.8;"></a-entity>
        
        <!-- Lector inercial activo -->
        <a-entity camera look-controls rotation-reader></a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const escenarioFijo = document.getElementById('escenario-fijo');
        
        let idEstacionActual = null; 

        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios', lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: 'models/dino.glb', escala: '0.8 0.8 0.8' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: 'models/mono.glb', escala: '1.0 1.0 1.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona', lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, src: 'models/planta.glb', escala: '0.9 0.9 0.9' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(position => {
                const uLat = position.coords.latitude;
                const uLon = position.coords.longitude;
                
                let estacionActiva = null; let menorDistancia = Infinity;

                CIRCUITO_NEUQUEN.forEach(estacion => {
                    const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                    if (dist < menorDistancia) { menorDistancia = dist; }
                    if (dist <= estacion.rango) { estacionActiva = estacion; }
                });

                if (estacionActiva) {
                    if (idEstacionActual !== estacionActiva.id) {
                        idEstacionActual = estacionActiva.id;
                        
                        escenarioFijo.innerHTML = "";
                        
                        // Generamos el nodo
                        const nuevoModelo = document.createElement('a-entity');
                        nuevoModelo.setAttribute('gltf-model', estacionActiva.src);
                        nuevoModelo.setAttribute('scale', estacionActiva.escala);
                        nuevoModelo.setAttribute('rotation', '0 45 0');
                        
                        // INYECTAMOS EL CONGELADOR ACÁ:
                        nuevoModelo.setAttribute('anclaje-estatico', '');
                        
                        escenarioFijo.appendChild(nuevoModelo);
                    }
                    hud.innerHTML = `<span style="color: #10b981;">● En la Ubicación</span><br>${estacionActiva.nombre}`;
                } else {
                    if (idEstacionActual !== null) {
                        escenarioFijo.innerHTML = "";
                        idEstacionActual = null;
                    }
                    hud.innerHTML = `Explorando Neuquén...<br>Próximo punto de interés a: ${Math.round(menorDistancia)} metros`;
                }
            }, error => {
                hud.innerHTML = "Error: Habilitá la ubicación precisa.";
            }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }
    </script>
</body>
</html>
