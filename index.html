<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Circuito Turístico Neuquén - WebAR Final</title>
    
    <!-- Componentes de arquitectura estables para proyección de cámara continua -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #interfaz-turista {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            border: 1px solid rgba(6, 182, 212, 0.3);
            min-width: 280px;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- HUD unificado: Nunca se va a apagar ni ocultar -->
    <div id="interfaz-turista">Inicializando sensores de posición...</div>

    <!-- Escena continua: arjs maneja la cámara web de fondo de forma permanente sin botones de salida -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="dino-glb" src="models/dino.glb"></a-asset-item>
            <a-asset-item id="mono-glb" src="models/mono.glb"></a-asset-item>
            <a-asset-item id="planta-glb" src="models/planta.glb"></a-asset-item>
        </a-assets>

        <!-- ENTIDAD DINÁMICA GEOLOCALIZADA: AR.js calcula su posición cartesiana en base al norte magnético y al GPS del celular -->
        <a-entity id="nodo-geolocalizado" position="0 0 0" visible="false">
            <a-entity id="modelo-renderizado" rotation="0 180 0"></a-entity>
        </a-entity>

        <!-- Cámara de Tracking Continuo: Sincroniza el GPS del celular con el renderizador 3D segundo a segundo -->
        <a-entity 
            camera 
            gps-camera="simulateLatitude: 0; simulateLongitude: 0; positionMinAccuracy: 3; alertRadius: 50;" 
            rotation-reader>
        </a-entity>
        
    </a-scene>

    <script>
        const hud = document.getElementById('interfaz-turista');
        const nodoGeolocalizado = document.getElementById('nodo-geolocalizado');
        const renderObjeto = document.getElementById('modelo-renderizado');
        
        let idEstacionActual = null; 

        // Matriz oficial de tus puntos de testeo
        const CIRCUITO_NEUQUEN = [
            { id: 'dino', nombre: 'Estación 1: Parque de los Dinosaurios',  lat: -34.64350264084042, lon: -58.47254605523363, rango: 20, src: '#dino-glb', escala: '0.8 0.8 0.8' },
            { id: 'mono', nombre: 'Estación 2: Fauna de la Barda', lat: -34.644489104415065, lon: -58.47366534972228, rango: 20, src: '#mono-glb', escala: '1.0 1.0 1.0' },
            { id: 'planta', nombre: 'Estación 3: Flora Autóctona',lat: -34.64495467831919, lon: -58.47277079022688, rango: 15, src: '#planta-glb', escala: '1.0 1.0 1.0' }
        ];

        function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // Capturamos el evento nativo de actualización de coordenadas de AR.js
        window.addEventListener('gps-camera-update-position', e => {
            const uLat = e.detail.position.latitude;
            const uLon = e.detail.position.longitude;
            
            let estacionActiva = null; 
            let menorDistancia = Infinity;

            CIRCUITO_NEUQUEN.forEach(estacion => {
                const dist = obtenerDistanciaMetros(uLat, uLon, estacion.lat, estacion.lon);
                if (dist < menorDistancia) {
                    menorDistancia = dist;
                }
                if (dist <= estacion.rango) {
                    estacionActiva = estacion;
                }
            });

            if (estacionActiva) {
                if (idEstacionActual !== estacionActiva.id) {
                    idEstacionActual = estacionActiva.id;
                    
                    // Clavamos el nodo contenedor exactamente en la coordenada planetaria del asset
                    nodoGeolocalizado.setAttribute('gps-entity-place', `latitude: ${estacionActiva.lat}; longitude: ${estacionActiva.lon};`);
                    
                    // Inyectamos el modelo 3D y su escala
                    renderObjeto.setAttribute('gltf-model', estacionActiva.src);
                    renderObjeto.setAttribute('scale', estacionActiva.escala);
                    
                    // Hacemos el objeto visible en el espacio
                    nodoGeolocalizado.setAttribute('visible', 'true');
                }
                
                // Mantenemos la indicación en pantalla sin cortar la transmisión de la cámara
                hud.innerHTML = `<span style="color: #10b981;">● En Ubicación</span><br>${estacionActiva.nombre}`;
            } else {
                // Si salimos del rango, el objeto se oculta pero la cámara y la cuenta regresiva siguen vivas en el HUD
                if (idEstacionActual !== null) {
                    nodoGeolocalizado.setAttribute('visible', 'false');
                    renderObjeto.removeAttribute('gltf-model');
                    idEstacionActual = null;
                }
                hud.innerHTML = `Explorando Neuquén...<br>Próxima estación a: ${Math.round(menorDistancia)} metros`;
            }
        });
    </script>
</body>
</html>
